<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Corrective skincare for Black and brown skin — facials, chemical peels, microneedling & more in Arlington, TX." />

  <!-- PWA / Apple Mobile Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Rosie's Beauty Spa" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#9B1B21" />
  <meta name="msapplication-TileColor" content="#9B1B21" />

  <!-- Open Graph -->
  <meta property="og:title" content="Rosie's Beauty Spa" />
  <meta property="og:description" content="Corrective skincare for Black and brown skin in Arlington, TX." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/images/og-image.jpg" />

  <title>Rosie's Beauty Spa</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- Font Preloads -->
  <link rel="preload" href="assets/fonts/Cardo-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="assets/fonts/Figtree-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="assets/fonts/Figtree-SemiBold.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

  <!-- Phosphor Icons (local) -->
  <link rel="stylesheet" href="assets/icons/phosphor.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tab-bar.css" />
  <link rel="stylesheet" href="css/onboarding.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/treatment-detail.css" />
</head>
<body>

  <!-- =========================================
       ONBOARDING FLOW
  ========================================== -->
  <div id="onboarding" class="onboarding hidden" role="main" aria-label="Welcome onboarding"></div>

  <!-- =========================================
       MAIN APP
  ========================================== -->
  <main id="app" class="app hidden" aria-label="Rosie's Beauty Spa">

    <!-- Tab Panels -->
    <div id="tab-home" class="tab-panel active" role="tabpanel" aria-labelledby="tab-btn-home">
      <!-- Home content rendered by home.js -->
    </div>

    <div id="tab-book" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-book">
      <!-- Book content rendered by app.js placeholder -->
    </div>

    <div id="tab-shop" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-shop">
      <!-- Shop content rendered by app.js placeholder -->
    </div>

    <div id="tab-rewards" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-rewards">
      <!-- Rewards content rendered by app.js placeholder -->
    </div>

    <div id="tab-profile" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-profile">
      <!-- Profile content rendered by app.js placeholder -->
    </div>

    <!-- Treatment Detail Overlay -->
    <div id="treatment-overlay" class="treatment-overlay hidden" role="dialog" aria-modal="true" aria-label="Treatment details">
      <div class="treatment-overlay__backdrop" id="overlay-backdrop"></div>
      <div class="treatment-overlay__sheet">
        <div class="treatment-overlay__handle"></div>
        <div id="treatment-overlay-content" class="treatment-overlay__content">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <nav id="tab-bar" class="tab-bar" role="tablist" aria-label="Main navigation">
      <button
        id="tab-btn-home"
        class="tab active"
        data-tab="home"
        role="tab"
        aria-selected="true"
        aria-controls="tab-home"
      >
        <i class="ph ph-house-simple" aria-hidden="true"></i>
        <span>Home</span>
      </button>

      <button
        id="tab-btn-book"
        class="tab"
        data-tab="book"
        role="tab"
        aria-selected="false"
        aria-controls="tab-book"
      >
        <i class="ph ph-calendar-blank" aria-hidden="true"></i>
        <span>Book</span>
      </button>

      <button
        id="tab-btn-shop"
        class="tab"
        data-tab="shop"
        role="tab"
        aria-selected="false"
        aria-controls="tab-shop"
      >
        <i class="ph ph-bag-simple" aria-hidden="true"></i>
        <span>Shop</span>
      </button>

      <button
        id="tab-btn-rewards"
        class="tab"
        data-tab="rewards"
        role="tab"
        aria-selected="false"
        aria-controls="tab-rewards"
      >
        <i class="ph ph-gift" aria-hidden="true"></i>
        <span>Rewards</span>
      </button>

      <button
        id="tab-btn-profile"
        class="tab"
        data-tab="profile"
        role="tab"
        aria-selected="false"
        aria-controls="tab-profile"
      >
        <i class="ph ph-user" aria-hidden="true"></i>
        <span>Profile</span>
      </button>
    </nav>

  </main><!-- /#app -->

  <!-- JS — load order matters -->
  <script src="js/data.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/app.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/home.js"></script>
  <script src="js/treatment-detail.js"></script>

</body>
</html>
